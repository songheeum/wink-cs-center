<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>단비공감팀 상담가이드</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="상담 카테고리 메뉴">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <strong>단비공감팀 상담가이드</strong>
      </div>

      <nav class="nav" id="mainNav" aria-label="상담 메뉴"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <label class="top-search" aria-label="통합 검색">
          <span aria-hidden="true">⌕</span>
          <input id="globalSearch" type="search" placeholder="검색: 증상, 기기, 점검 종류, 처리자" autocomplete="off" />
        </label>
        <div class="top-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="라이트/다크 모드 전환">
            <span class="sun" aria-hidden="true">☀</span><span id="themeLabel">Light</span>
          </button>
        </div>
      </header>

      <section class="page" id="pageRoot">
        <div class="loading-card">
          <span class="spinner" aria-hidden="true"></span>
          <p>점검 데이터를 불러오는 중입니다.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
