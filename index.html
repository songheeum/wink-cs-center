<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단비공감팀 상담가이드 · 점검 대시보드</title>
  <meta name="description" content="Apple 톤으로 정리한 단비공감팀 상담가이드" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" crossorigin />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-view="home">
  <header class="topbar">
    <button class="brand" id="brandHome" type="button" aria-label="홈으로 이동">
      <div class="brand-mark" aria-hidden="true">D</div>
      <div class="brand-text">
        <strong>단비공감팀 상담가이드</strong>
        <span>점검 대시보드</span>
      </div>
    </button>

    <div class="top-search">
      <span class="si" aria-hidden="true"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></span>
      <input id="globalSearch" type="search" placeholder="검색: 저장됨, 앱 튕김, 터치펜, 환불, 배송…" autocomplete="off" />
      <button class="search-submit" id="globalSearchBtn" type="button">검색</button>
    </div>

    <div class="top-actions">
      <div class="live-badge" title="자마드 실시간 연동">
        <span class="live-dot" aria-hidden="true"></span>
        <span class="live-text">실시간 연동</span>
        <span class="live-since" id="liveSince">연결 중…</span>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="라이트/다크 전환">
        <span class="sun" aria-hidden="true"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span><span id="themeLabel">Light</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" aria-label="좌측 메뉴">
      <nav class="nav" id="mainNav"></nav>
    </aside>

    <main class="content">
      <section class="page" id="pageRoot">
        <div class="loading-card"><span class="spinner"></span><p>데이터를 불러오는 중입니다.</p></div>
      </section>
    </main>
  </div>

  <div class="autocomplete-panel" id="globalSuggest" role="listbox" hidden></div>

  <script src="./app.js" defer></script>
</body>
</html>
