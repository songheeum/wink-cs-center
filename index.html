<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단비공감팀 상담가이드</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="좌측 메뉴">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <strong>단비공감팀 상담가이드</strong>
      </div>

      <nav class="nav" id="mainNav"></nav>


      <div class="sidebar-footer">
        <div class="update-card">
          <span class="ico">▣</span>
          <div>
            <strong>가이드 업데이트</strong>
            <small id="lastUpdateText">CSV 연결 대기</small>
          </div>
          <span>›</span>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="top-search">
          <span>⌕</span>
          <input id="globalSearch" type="search" placeholder="검색: 상담 주제, 증상, 점검 종류, 처리자" autocomplete="off" />
          <kbd>⌘ K</kbd>
        </div>
        <div class="top-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="라이트/다크 전환">
            <span class="sun">☀</span><span id="themeLabel">Light</span>
          </button>
        </div>
      </header>

      <section class="page" id="pageRoot">
        <div class="loading-card">
          <span class="spinner"></span>
          <p>점검 데이터를 불러오는 중입니다.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
