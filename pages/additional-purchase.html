<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추가구매 계산기</title>

<style>
body{
  font-family: Pretendard, sans-serif;
  background:#fff7fa;
  padding:30px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

.product{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

input[type="number"]{
  width:70px;
}
</style>

</head>

<body>

<div class="container">

  <h1>🛒 추가구매 계산기</h1>

  <div class="card">

    <h3>상품 구분</h3>

    <label>
      <input type="radio" name="brand" checked>
      윙크
    </label>

    <label>
      <input type="radio" name="brand">
      캐츠잉글리시
    </label>

  </div>

  <div class="card">

    <h3>상품 선택</h3>

    <div class="product">
      <label>
        <input type="checkbox">
        윙크 전용 충전기 (WD/WC)
      </label>

      <input type="number" value="1">
    </div>

    <div class="product">
      <label>
        <input type="checkbox">
        스쿨 공용 키보드 스킨
      </label>

      <input type="number" value="1">
    </div>

    <div class="product">
      <label>
        <input type="checkbox">
        한글 교재
      </label>

      <input type="number" value="1">
    </div>

  </div>

  <div class="card">

    <label>
      <input type="checkbox">
      배송비 포함
    </label>

  </div>

  <div class="card">

    <h3>결과</h3>

상품금액 :
<span id="productPrice">0원</span>

<br><br>

배송비 :
<span id="shippingPrice">0원</span>

<br><br>

총금액 :
<b id="totalPrice">0원</b>

  </div>

</div>
<script>

function calculate(){

  let total = 0;

  const products = [
    {
      checkbox: document.querySelectorAll('input[type="checkbox"]')[0],
      qty: document.querySelectorAll('input[type="number"]')[0],
      price: 10000
    },
    {
      checkbox: document.querySelectorAll('input[type="checkbox"]')[1],
      qty: document.querySelectorAll('input[type="number"]')[1],
      price: 3000
    },
    {
      checkbox: document.querySelectorAll('input[type="checkbox"]')[2],
      qty: document.querySelectorAll('input[type="number"]')[2],
      price: 12000
    }
  ];

  products.forEach(item=>{
    if(item.checkbox.checked){
      total += item.price * Number(item.qty.value);
    }
  });

  const shippingCheckbox =
    document.querySelectorAll('input[type="checkbox"]')[3];

  const shipping =
    shippingCheckbox.checked ? 2000 : 0;

  document.getElementById('productPrice').innerText =
    total.toLocaleString() + '원';

  document.getElementById('shippingPrice').innerText =
    shipping.toLocaleString() + '원';

  document.getElementById('totalPrice').innerText =
    (total+shipping).toLocaleString() + '원';

}

document
.querySelectorAll('input')
.forEach(el=>{

  el.addEventListener('change',calculate);
  el.addEventListener('input',calculate);

});

calculate();

</script>
</body>
</html>
