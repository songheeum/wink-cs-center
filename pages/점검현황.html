:root{
  --bg:#F2F4F6;--panel:#fff;--line:#F1E2E9;--ink:#191F28;--sub:#4E5968;--muted:#8B95A1;
  --blue:#3182F6;--blue2:#E8F3FF;--blue-deep:#1B64DA;--blue-light:#B3D4FF;--blue-soft2:#E8F3FF;
  --green:#12b76a;--greenBg:#ecfdf3;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--ink);
  font-family:'Pretendard Variable',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;max-width:540px;margin:0 auto;background:var(--panel);box-shadow:0 0 32px rgba(0,0,0,0.04);}

/* 상단 고정 헤더 */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #F2F4F6;}
header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:6px;}
header h1 span{font-size:12px;background:var(--blue2);color:var(--blue-deep);padding:3px 8px;border-radius:6px;}
.refresh-btn{background:none;border:none;padding:8px;cursor:pointer;color:var(--sub);display:flex;align-items:center;}

/* 필터 영역 */
.filter-sec{padding:12px 20px 16px 20px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid #F2F4F6;}
.search-wrap{position:relative;}
.search-wrap input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid #E5E8EB;background:#F9FAFB;font-size:15px;outline:none;transition:all 0.2s;}
.search-wrap input:focus{background:#fff;border-color:var(--blue);}

.row2{display:flex;gap:8px;}
.period-wrap, .cat-wrap, .owner-wrap{flex:1;position:relative;}
.p-btn, .c-btn, .o-btn{width:100%;padding:12px;border-radius:12px;border:1px solid #E5E8EB;background:#fff;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:between;}

/* 하단 목록 영역 (⭐ 피로감 방지 핵심 수정 구역) */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:16px 20px;}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px;}
.list-header .count{font-size:14px;font-weight:600;color:var(--sub);}
.list-header .count span{color:var(--blue);font-weight:700;}

/* 고정 및 내부 스크롤 설정 */
.list-wrap {
  flex: 1;
  background: var(--panel);
  border-radius: 20px;
  max-height: 520px;         /* 화면 아래로 무한정 늘어나는 현상 원천 차단 */
  overflow-y: auto;          /* 리스트 데이터가 많아지면 내부에서만 부드럽게 스크롤 */
  padding-right: 4px;
}

/* 개별 행 (토스 스타일 쫀득한 디자인) */
.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 14px;
  border-radius: 14px;
  margin-bottom: 6px;
  transition: background 0.2s ease;
  cursor: pointer;
}
.item:hover {
  background-color: #F9FAFB; /* 마우스 올렸을 때 쫀득하게 반응 */
}

/* 상태 알약 배지 디자인 */
.status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
}
.status.완료 { background-color: #EBF5FF !important; color: #1B64DA !important; }
.status.대기 { background-color: #FEEEDC !important; color: #B45309 !important; }
.status.진행 { background-color: #E6F4EA !important; color: #137333 !important; }

/* 팝업 레이어 */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:999;}
.modal.show{display:flex;}
.modal-content{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 12px 32px rgba(0,0,0,0.1);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-close{width:100%;padding:14px;background:#F2F4F6;border:none;border-radius:14px;font-weight:600;cursor:pointer;margin-top:16px;}
