function parseCSV(text){var rows=[],row=[],cur="",q=false;for(var i=0;i<text.length;i++){var c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c==='\r'){}else cur+=c;}}if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}
var COLS={접수일:'date',점검종류:'type',자마드주소:'url',증상:'sym',처리자:'who',소요시간:'dur',상태:'status',증상카테고리:'cat',카테고리:'cat',분류:'cat'};
function norm(s){return (s||'').replace(/\s|\(.*?\)/g,'').trim();}
function buildItems(rows){var hi=-1;for(var i=0;i<rows.length;i++){if(rows[i].some(function(c){return norm(c)==='접수일';})){hi=i;break;}}if(hi<0)return[];var header=rows[hi].map(norm);var map={};header.forEach(function(h,idx){if(COLS[h])map[COLS[h]]=idx;});var out=[];for(var r=hi+1;r<rows.length;r++){var line=rows[r];if(!line||!(line[map.date]||'').trim())continue;var o={};for(var k in map)o[k]=(line[map[k]]||'').trim();if(!o.cat&&line[4])o.cat=(line[4]||'').trim();out.push(o);}return out;}
function statusKind(s){s=(s||'').trim();if(s.indexOf('취소')>=0)return{k:'cancel',label:s,cls:'b-cancel'};if(s.indexOf('이슈')>=0)return{k:'etc',label:s,cls:'b-issue'};if(s.indexOf('당일')>=0)return{k:'etc',label:s,cls:'b-urgent'};if(s.indexOf('부재')>=0)return{k:'etc',label:s,cls:'b-absent'};if(s.indexOf('완료')>=0)return{k:'done',label:s,cls:'b-done'};if(s.indexOf('예약')>=0)return{k:'book',label:s,cls:'b-book'};if(s.indexOf('처리중')>=0)return{k:'prog',label:s,cls:'b-prog'};return{k:'etc',label:s||'미정',cls:'b-etc'};}
function durMin(s){s=(s||'').trim();if(!s||s==='-')return -1;var h=s.match(/(\d+)\s*시간/),m=s.match(/(\d+)\s*분/),se=s.match(/(\d+)\s*초/);if(h||m||se)return (h?+h[1]:0)*60+(m?+m[1]:0)+(se?+se[1]/60:0);var n=s.match(/[\d.]+/);return n?parseFloat(n[0]):-1;}
function statusRank(o){var k=statusKind(o.status).k,rank={book:'1',prog:'2',done:'3',cancel:'4',etc:'5'};return (rank[k]||'9')+'_'+statusKind(o.status).label;}
function sortTh(key,label){var a=sortKey===key;return '<button class="sortable'+(a?' active':'')+'" data-key="'+key+'" type="button"'+(a?' data-dir="'+sortDir+'"':'')+'>'+label+' <span class="icons"><span class="up">▲</span><span class="down">▼</span></span></button>';}
function attachSort(){document.querySelectorAll('.sortable').forEach(function(b){b.onclick=function(e){e.stopPropagation();var k=this.getAttribute('data-key');if(sortKey!==k){sortKey=k;sortDir='desc';}else if(sortDir==='desc'){sortDir='asc';}else{sortKey='';sortDir='desc';}render();var ic=document.querySelector('.sortable[data-key="'+k+'"] .icons');if(ic)ic.classList.add('flash');};});}
function avatarSVG(name){name=(name||'').trim();var m={'도아':'<svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#FCE3EE"/><path d="M8 27C8 13 13 9 20 9s12 4 12 18v3a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2z" fill="#7A4E3B"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.7 21C10.7 13 15 10 20 10s9.3 3 9.3 11c-2.6-3.6-5.6-4.8-9.3-4.8s-6.7 1.2-9.3 4.8z" fill="#7A4E3B"/><circle cx="15.1" cy="23.6" r="1.9" fill="#F49AC0"/><circle cx="24.9" cy="23.6" r="1.9" fill="#F49AC0"/><circle cx="16.4" cy="21.4" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.4" r="1.5" fill="#3A2A33"/><path d="M18 25.8c1.3 1.4 2.7 1.4 4 0" stroke="#C9667F" stroke-width="1.3" fill="none" stroke-linecap="round"/><g transform="translate(30 18)"><path d="M0 0l5-3v6z" fill="#E76EA6"/><circle r="1.5" fill="#D35792"/></g></svg>','우교':'<svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#DBF3E9"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.8 21C10.8 12 15 9.5 20 9.5s9.2 3 9.2 11.5c-2-2.8-4-3.8-5.2-3.6 0 0-1.5 1.3-4 1.3s-3.6-1.1-4-1.3c-1.2-.2-3.2.8-5.2 3.6z" fill="#6E4A2E"/><path d="M19 9.8c.5-2.2 2.4-2.6 3.8-1.4" stroke="#6E4A2E" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="15.1" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="24.9" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="16.4" cy="21.7" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.7" r="1.5" fill="#3A2A33"/><path d="M18 26c1.3 1.3 2.7 1.3 4 0" stroke="#A86A55" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>','대성':'<svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#DCEBFB"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.6 21C10.6 12 14.6 9 20 9s9.4 3 9.4 12c-2-3-4.3-4-5.4-3.6-.6.2-1.6 1.4-4 1.4s-3.4-1.2-4-1.4c-1.1-.4-3.4.6-5.4 3.6z" fill="#3D3733"/><circle cx="15.1" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="24.9" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="16.4" cy="21.7" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.7" r="1.5" fill="#3A2A33"/><path d="M18 26c1.3 1.3 2.7 1.3 4 0" stroke="#A86A55" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>'};return m[name]||'';}
var ALL=[],filterStatus='all',filterStart='',filterEnd='',filterCat='all',query='',selectedOwner='',draftStart='',draftEnd='',calYear=2026,calMonth=0,sortKey='',sortDir='desc',shown=20,lastSig='',PAGE_SIZE=20;
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dateKey(d){return (d||'').trim().substring(0,10);}function monthKey(d){return dateKey(d).substring(0,7);}function shortDate(d){return dateKey(d).replace(/^20/,'')||'-';}function unique(arr){var out=[];arr.forEach(function(v){v=(v||'').trim();if(v&&out.indexOf(v)<0)out.push(v);});return out;}function pad(n){return String(n).padStart(2,'0');}function lastDay(y,m){return new Date(y,m+1,0).getDate();}function monthLabel(m){var p=m.split('-');return Number(p[0])+'년 '+Number(p[1])+'월';}function orderedRange(a,b){if(!a&&!b)return['',''];if(a&&!b)return[a,''];if(!a&&b)return[b,''];return a<=b?[a,b]:[b,a];}
function setCalendarFromDate(d){var v=dateKey(d);if(/^\d{4}-\d{2}-\d{2}$/.test(v)){calYear=Number(v.slice(0,4));calMonth=Number(v.slice(5,7))-1;}}
function updatePeriodLabel(){var txt='전체 기간';if(filterStart&&filterEnd)txt=filterStart+' ~ '+filterEnd;else if(filterStart)txt=filterStart+'부터';document.getElementById('periodBtn').textContent=txt;document.getElementById('periodWrap').classList.toggle('has-range',!!(filterStart||filterEnd));}
function updateSearchButton(){document.getElementById('closeRange').disabled=!draftStart;}
function renderCalendar(){document.getElementById('calTitle').textContent=calYear+'년 '+(calMonth+1)+'월';var first=new Date(calYear,calMonth,1).getDay(),days=lastDay(calYear,calMonth),html='',rr=orderedRange(draftStart||filterStart,draftEnd||filterEnd),viewStart=rr[0],viewEnd=rr[1];for(var i=0;i<first;i++)html+='<button class="day muted" type="button"> </button>';for(var d=1;d<=days;d++){var ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d),cls='day';if(viewStart&&ds===viewStart)cls+=' start';if(viewEnd&&ds===viewEnd)cls+=' end';if(viewStart&&viewEnd&&ds>viewStart&&ds<viewEnd)cls+=' inrange';html+='<button class="'+cls+'" type="button" data-date="'+ds+'">'+d+'</button>';}document.getElementById('calDays').innerHTML=html;document.querySelectorAll('#calDays .day[data-date]').forEach(function(b){b.onclick=function(e){e.stopPropagation();chooseDate(this.getAttribute('data-date'));};});var hint='시작일을 누른 뒤 종료일을 선택하고 검색을 눌러주세요.';if(draftStart&&!draftEnd)hint='시작일 '+draftStart+' 선택됨. 종료일을 선택해 주세요.';if(draftStart&&draftEnd){var r=orderedRange(draftStart,draftEnd);hint=r[0]+' ~ '+r[1]+' 선택됨. 검색을 누르면 적용됩니다.';}document.getElementById('rangeHint').textContent=hint;updateSearchButton();}
function chooseDate(ds){if(!draftStart||(draftStart&&draftEnd)){draftStart=ds;draftEnd='';}else{draftEnd=ds;var rr=orderedRange(draftStart,draftEnd);draftStart=rr[0];draftEnd=rr[1];}renderCalendar();}
function renderMonthShortcuts(){var months=unique(ALL.map(function(o){return monthKey(o.date);})).sort().reverse();document.getElementById('monthShortcuts').innerHTML=months.map(function(m){return '<button type="button" data-month="'+esc(m)+'">'+esc(monthLabel(m))+'</button>';}).join('');document.querySelectorAll('#monthShortcuts button').forEach(function(b){b.onclick=function(e){e.stopPropagation();var m=this.getAttribute('data-month'),y=Number(m.slice(0,4)),mo=Number(m.slice(5,7))-1;draftStart=m+'-01';draftEnd=m+'-'+pad(lastDay(y,mo));calYear=y;calMonth=mo;renderCalendar();};});}
function clearPeriod(){filterStart='';filterEnd='';draftStart='';draftEnd='';document.getElementById('rangePanel').classList.remove('show');updatePeriodLabel();renderCalendar();render();}
function renderCatMenu(){var cats=unique(ALL.map(function(o){return o.cat;})).sort();var label=filterCat==='all'?'전체 카테고리':filterCat;document.getElementById('catBtn').textContent=label;var html='<button type="button" class="cat-option '+(filterCat==='all'?'on':'')+'" data-cat="all">전체 카테고리</button>';html+=cats.map(function(c){return '<button type="button" class="cat-option '+(filterCat===c?'on':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>';}).join('');document.getElementById('catMenu').innerHTML=html;document.querySelectorAll('#catMenu .cat-option').forEach(function(b){b.onclick=function(e){e.stopPropagation();filterCat=this.getAttribute('data-cat');document.getElementById('catMenu').classList.remove('show');renderCatMenu();render();};});}
function initFilters(){renderMonthShortcuts();renderCatMenu();if(ALL[0])setCalendarFromDate(ALL[0].date);renderCalendar();updatePeriodLabel();}
function filterOwner(name,btn){selectedOwner=name;document.querySelectorAll('#memberPicker button').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');var lbl=document.getElementById('ownerLabel');if(lbl)lbl.textContent=name?name:'담당자';document.getElementById('memberPicker').classList.remove('open');document.getElementById('mine').classList.remove('on');render();}
function filteredList(){var list=ALL.filter(function(o){var d=dateKey(o.date);if(selectedOwner&&(o.who||'').trim()!==selectedOwner)return false;if(filterStatus!=='all'&&statusKind(o.status).k!==filterStatus)return false;if(filterStart&&d<filterStart)return false;if(filterEnd&&d>filterEnd)return false;if(filterCat!=='all'&&(o.cat||'').trim()!==filterCat)return false;if(query){var hay=((o.sym||'')+(o.type||'')+(o.cat||'')+(o.url||'')+(o.who||'')+(o.status||'')).toLowerCase();if(hay.indexOf(query.toLowerCase())<0)return false;}return true;});list.sort(function(a,b){var r=0;if(sortKey==='date'){r=(new Date(dateKey(a.date)||'1900-01-01'))-(new Date(dateKey(b.date)||'1900-01-01'));}else if(sortKey==='dur'){r=durMin(a.dur)-durMin(b.dur);}else if(sortKey==='who'){r=String(a.who||'').localeCompare(String(b.who||''),'ko');}else if(sortKey==='status'){r=statusRank(a).localeCompare(statusRank(b),'ko');}if(r!==0)return sortDir==='desc'?-r:r;return (new Date(dateKey(b.date)||'1900-01-01'))-(new Date(dateKey(a.date)||'1900-01-01'));});return list;}
function dayHeader(ds){var p=dateKey(ds);if(!/^\d{4}-\d{2}-\d{2}$/.test(p))return p||'-';var dt=new Date(p+'T00:00:00');var w=['일','월','화','수','목','금','토'][dt.getDay()];return Number(p.slice(5,7))+'월 '+Number(p.slice(8,10))+'일 ('+w+')';}
function cleanLabel(s){return (s||'').replace(/\s*_\s*/g,' - ').trim();}
function priorityKind(o){var k=statusKind(o.status).k;if(k==='prog')return{cls:'high',label:'높음'};if(k==='book')return{cls:'mid',label:'보통'};if(k==='done')return{cls:'low',label:'낮음'};return{cls:'',label:'-'};}
function render(){var list=filteredList(),el=document.getElementById('list');var sig=[filterStatus,filterStart,filterEnd,filterCat,query,selectedOwner,sortKey,sortDir].join('|');if(sig!==lastSig){shown=PAGE_SIZE;lastSig=sig;}if(!list.length){el.innerHTML='<div class="msg">표시할 점검건이 없어요.</div>';document.getElementById('pageInfo').textContent='필터 0건 / 전체 '+ALL.length+'건';return;}var view=list.slice(0,shown),grouped=(sortKey===''||sortKey==='date');var head='<div class="table-card"><div class="thead"><div>증상 / 점검종류</div>'+sortTh('status','상태')+sortTh('who','담당자')+sortTh('dur','소요')+sortTh('date','날짜')+'<div>우선순위</div></div>';var body='',lastD=null;view.forEach(function(o){if(grouped){var dk=dateKey(o.date);if(dk!==lastD){body+='<div class="daygrp">'+esc(dayHeader(o.date))+'</div>';lastD=dk;}}var st=statusKind(o.status),pr=priorityKind(o),link=o.url&&/^https?:/.test(o.url)?'<div class="link"><a href="'+esc(o.url)+'" target="_blank" rel="noopener">자마드 열기 ↗</a></div>':'';body+='<div class="tr" data-k="'+st.k+'" onclick="toggleRow(this,event)"><div class="tr-main"><div><div class="item-main"><span class="cat-pill">'+esc(cleanLabel(o.cat||'분류'))+'</span><div class="sym">'+esc(cleanLabel(o.sym||'(증상 없음)'))+'</div></div><div class="subline">'+esc(cleanLabel(o.type||'-'))+'</div></div><div><span class="badge '+st.cls+'">'+esc(st.label)+'</span></div><div class="who">'+avatarSVG(o.who)+'<b>'+esc(o.who||'-')+'</b></div><div class="dur"><b>'+esc(o.dur||'-')+'</b></div><div class="date">'+esc(shortDate(o.date))+'</div><div class="priority '+pr.cls+'">'+esc(pr.label)+'</div></div><div class="detail"><div class="detail-grid"><div class="box"><b>증상 카테고리</b>'+esc(cleanLabel(o.cat||'-'))+'</div><div class="box"><b>점검종류</b>'+esc(cleanLabel(o.type||'-'))+'</div><div class="box"><b>세부상태</b>'+esc(o.status||'-')+'</div><div class="box"><b>접수일</b>'+esc(o.date||'-')+'</div></div>'+link+'</div></div>';});var more=list.length>shown?'<button class="more-btn" id="moreBtn" type="button">더 보기 ('+(list.length-shown)+'건 남음) ▾</button>':'';el.innerHTML=head+body+more+'</div>';document.getElementById('pageInfo').textContent='표시 '+view.length+'건 · 필터 '+list.length+'건 / 전체 '+ALL.length+'건';attachSort();var mb=document.getElementById('moreBtn');if(mb)mb.onclick=function(){shown+=PAGE_SIZE;render();};}
function toggleRow(row,e){if(e.target.tagName==='A'||e.target.closest('.sortable'))return;row.classList.toggle('open');}
function renderMetrics(cnt){var doneRate=cnt.all?Math.round((cnt.done/cnt.all)*100):0;var mins=ALL.map(function(o){return durMin(o.dur);}).filter(function(n){return n>=0;});var avg=mins.length?Math.round(mins.reduce(function(a,b){return a+b;},0)/mins.length):0;var today=new Date(),td=today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());var todayDone=ALL.filter(function(o){return dateKey(o.date)===td&&statusKind(o.status).k==='done';}).length;document.getElementById('metrics').innerHTML='<div class="metric"><small>완료율</small><b>'+doneRate+'%</b><span>전체 대비 처리완료 비율</span></div><div class="metric"><small>평균 소요</small><b>'+(avg?avg+'분':'-')+'</b><span>소요시간 입력 건 기준</span></div><div class="metric"><small>오늘 처리</small><b>'+todayDone+'건</b><span>'+td+' 완료 건수</span></div>';}
function renderSummary(){var cnt={all:ALL.length,book:0,prog:0,done:0,cancel:0,etc:0};ALL.forEach(function(o){cnt[statusKind(o.status).k]++;});var defs=[['all','전체','총 누적 점검'],['book','예약','대기 중'],['prog','처리중','진행 중'],['done','완료','처리완료'],['cancel','취소','취소/보류']];document.getElementById('summary').innerHTML=defs.map(function(d){return '<div class="chip '+(filterStatus===d[0]?'on':'')+'" data-k="'+d[0]+'"><div class="l">'+d[1]+'</div><div class="n">'+(cnt[d[0]]||0)+'</div><div class="meta">'+d[2]+'</div></div>';}).join('');renderMetrics(cnt);document.querySelectorAll('.chip,#statusTabs .tab').forEach(function(c){c.classList.toggle('on',c.getAttribute('data-k')===filterStatus);c.onclick=function(){filterStatus=this.getAttribute('data-k');renderSummary();render();};});}
function setDefaultPeriod(){if(!ALL.length)return;var months=unique(ALL.map(function(o){return monthKey(o.date);})).filter(Boolean).sort();if(!months.length)return;var m=months[months.length-1],y=Number(m.slice(0,4)),mo=Number(m.slice(5,7))-1;filterStart=m+'-01';filterEnd=m+'-'+pad(lastDay(y,mo));calYear=y;calMonth=mo;}
function load(){var el=document.getElementById('list');if(!SHEET_CSV_URL){el.innerHTML='<div class="msg">시트 주소가 없어요.</div>';return;}el.innerHTML='<div class="msg">불러오는 중…</div>';fetch(SHEET_CSV_URL+(SHEET_CSV_URL.indexOf('?')<0?'?':'&')+'t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(t){ALL=buildItems(parseCSV(t));ALL.sort(function(a,b){return new Date(dateKey(b.date))-new Date(dateKey(a.date));});setDefaultPeriod();renderSummary();initFilters();render();var d=new Date();document.getElementById('updated').textContent='업데이트 '+pad(d.getHours())+':'+pad(d.getMinutes());}).catch(function(){el.innerHTML='<div class="msg">데이터를 불러오지 못했어요.<br>시트 게시 상태와 CSV 주소를 확인해 주세요.</div>';});}
document.getElementById('refresh').onclick=load;document.getElementById('mine').onclick=function(e){e.stopPropagation();var open=document.getElementById('memberPicker').classList.toggle('open');this.classList.toggle('on',open);};document.getElementById('q').addEventListener('input',function(){query=this.value;render();});document.getElementById('periodBtn').onclick=function(e){e.stopPropagation();document.getElementById('rangePanel').classList.toggle('show');};document.getElementById('periodClear').onclick=function(e){e.stopPropagation();clearPeriod();};document.getElementById('rangePanel').onclick=function(e){e.stopPropagation();};document.getElementById('prevMonth').onclick=function(e){e.stopPropagation();calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();};document.getElementById('nextMonth').onclick=function(e){e.stopPropagation();calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};document.getElementById('clearRange').onclick=function(e){e.stopPropagation();clearPeriod();};document.getElementById('closeRange').onclick=function(e){e.stopPropagation();if(draftStart){var rr=orderedRange(draftStart,draftEnd||draftStart);filterStart=rr[0];filterEnd=rr[1];draftStart='';draftEnd='';updatePeriodLabel();renderCalendar();render();document.getElementById('rangePanel').classList.remove('show');}};document.getElementById('catBtn').onclick=function(e){e.stopPropagation();document.getElementById('catMenu').classList.toggle('show');};document.getElementById('catMenu').onclick=function(e){e.stopPropagation();};document.addEventListener('click',function(e){if(!e.target.closest('.period-wrap'))document.getElementById('rangePanel').classList.remove('show');if(!e.target.closest('.cat-wrap'))document.getElementById('catMenu').classList.remove('show');if(!e.target.closest('.owner-wrap')){document.getElementById('memberPicker').classList.remove('open');document.getElementById('mine').classList.remove('on');}});load();
