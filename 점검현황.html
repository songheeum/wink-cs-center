<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💻 자마드 점검</title>

<!-- ===================================================================
     ▼▼▼ 여기에 구글시트 "웹에 게시(CSV)" 주소를 붙여넣으세요 ▼▼▼
     예) https://docs.google.com/spreadsheets/d/e/2PACX-xxxx/pub?gid=0&single=true&output=csv
=================================================================== -->
<script>
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGdaw55jIrzBzL_Mg9Q-MbCgyqK-8oPrEsk32q8gT218vd6YHTJDPtep7vCPfFABzjGmuxokXI7f0t/pub?gid=742834396&single=true&output=csv";   // ← 여기에 CSV URL 붙여넣기
  var MY_NAME = "도아";       // ← "내 점검건" 기준 (처리자 이름)
</script>

<style>
@font-face{font-family:'Pretendard Variable';font-style:normal;font-weight:45 920;font-display:swap;
  src:url('pretendard.woff2') format('woff2');}

:root{
  --blue:#0066cc; --ink:#1d1d1f; --ink-2:#6e6e73; --ink-3:#98a2b3;
  --border:#e6e6ea; --bg:#f5f5f7; --card:#ffffff;
  --g:#34c759; --o:#ff9500; --r:#ff3b30; --gray:#8e8e93;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px;}
.wrap{max-width:1100px;margin:0 auto;}

.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.top h1{font-size:21px;font-weight:700;letter-spacing:-.3px;}
.top .right{display:flex;align-items:center;gap:10px;}
.updated{font-size:12px;color:var(--ink-3);}
.refresh{border:1px solid var(--border);background:var(--card);color:var(--blue);font-family:inherit;
  font-size:13px;font-weight:600;padding:7px 13px;border-radius:10px;cursor:pointer;}
.refresh:active{background:#eef4fc;}

/* 상태 요약 칩 */
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.chip{flex:1;min-width:104px;background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 14px 12px;text-align:left;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.chip:hover{border-color:#cfd2d8;transform:translateY(-1px);}
.chip .n{font-size:27px;font-weight:700;letter-spacing:-.6px;line-height:1;}
.chip .l{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);margin-top:8px;font-weight:600;}
.chip .l::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ink-3);flex:0 0 auto;}
.chip[data-k="all"]  .l::before{background:var(--blue);}
.chip[data-k="book"] .l::before{background:var(--blue);}
.chip[data-k="prog"] .l::before{background:var(--o);}
.chip[data-k="done"] .l::before{background:var(--g);}
.chip[data-k="cancel"] .l::before{background:var(--r);}
.chip.on{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,102,204,.15);}
.chip[data-k="prog"].on{border-color:var(--o);box-shadow:0 0 0 2px rgba(255,149,0,.18);}
.chip[data-k="done"].on{border-color:var(--g);box-shadow:0 0 0 2px rgba(52,199,89,.18);}
.chip[data-k="cancel"].on{border-color:var(--r);box-shadow:0 0 0 2px rgba(255,59,48,.18);}

/* 컨트롤 */
.controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search{flex:1;position:relative;}
.search input{width:100%;height:44px;border:1px solid var(--border);border-radius:12px;background:var(--card);
  padding:0 14px;font-family:inherit;font-size:14px;outline:none;}
.search input:focus{border-color:var(--blue);}
.mine{flex:0 0 auto;height:44px;border:1px solid var(--border);background:var(--card);border-radius:12px;
  padding:0 14px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;white-space:nowrap;}
.mine.on{border-color:var(--blue);background:#f0f6ff;color:var(--blue);}

/* 담당자 선택 알약(Pill) 버튼 */
#memberPicker{flex-basis:100%;display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;}
#memberPicker button{
  border:1px solid var(--border);background:var(--card);color:var(--ink-2);
  font-family:inherit;font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:999px;cursor:pointer;transition:.12s;
  -webkit-tap-highlight-color:transparent;}
#memberPicker button:hover{border-color:#cfd2d8;}
#memberPicker button.active{border-color:var(--blue);background:var(--blue);color:#fff;}

/* 리스트 */
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;align-content:start;}
.row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;}
.row .head{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;}
.b-type{background:#eef1f5;color:var(--ink-2);}
.b-done{background:#e7f9ec;color:#1a8a3a;}
.b-book{background:#eaf2ff;color:var(--blue);}
.b-prog{background:#fff3e0;color:#c06f00;}
.b-cancel{background:#f0f0f2;color:var(--gray);}
.b-issue{
  background:#dbeafe;
  color:#2563eb;
}

.b-urgent{
  background:#fee2e2;
  color:#dc2626;
  font-weight:700;
}

.b-absent{
  background:#f3f4f6;
  color:#6b7280;
}

.b-etc{
  background:#eef2ff;
  color:#4338ca;
}
.date{margin-left:auto;font-size:12px;color:var(--ink-3);}
.row .sym{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:6px;}
.row .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-2);}
.row .meta b{font-weight:600;color:var(--ink);}
     .detail{
  margin-top:6px;
  font-size:12px;
  color:#666;
}
.row .link{font-size:12.5px;}
.row .link a{color:var(--blue);text-decoration:none;}
.row .link a:hover{text-decoration:underline;}
.msg{grid-column:1/-1;text-align:center;color:var(--ink-3);font-size:14px;line-height:1.7;padding:48px 16px;}
.msg b{color:var(--ink-2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>💻 자마드 점검</h1>
    <div class="right">
      <span class="updated" id="updated"></span>
      <button class="refresh" id="refresh">새로고침</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>

       <div class="controls">
  <div class="search">
    <input id="q" type="text" placeholder="증상·점검종류·자마드 검색" autocomplete="off">
  </div>

  <button class="mine" id="mine">내 점검건</button>

  <div id="memberPicker" class="picker" style="display:none">
    <button onclick="filterOwner('도아', this)">도아</button>
    <button onclick="filterOwner('우교', this)">우교</button>
    <button onclick="filterOwner('대성', this)">대성</button>
    <button onclick="filterOwner('', this)">전체보기</button>
  </div>
</div>
  <div id="list"></div>
</div>

<script>
/* ---------- CSV 파서 (따옴표·쉼표·줄바꿈 처리) ---------- */
function parseCSV(text){
  var rows=[],row=[],cur="",q=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur);cur=""; }
      else if(c==='\n'){ row.push(cur);rows.push(row);row=[];cur=""; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur);rows.push(row); }
  return rows;
}

/* ---------- 헤더 자동 탐지 + 컬럼명 매핑 ---------- */
var COLS={접수일:'date',점검종류:'type',자마드주소:'url',증상:'sym',처리자:'who',
  소요시간:'dur',상태:'status'
       };
function norm(s){return (s||'').replace(/\s|\(.*?\)/g,'').trim();}

function buildItems(rows){
  var hi=-1;
  for(var i=0;i<rows.length;i++){
    if(rows[i].some(function(c){return norm(c)==='접수일';})){hi=i;break;}
  }
  if(hi<0) return [];
  var header=rows[hi].map(norm);
  var map={};
  header.forEach(function(h,idx){ if(COLS[h]) map[COLS[h]]=idx; });
  var out=[];
  for(var r=hi+1;r<rows.length;r++){
    var line=rows[r];
    if(!line||!(line[map.date]||'').trim()) continue;
    var o={};
    for(var k in map) o[k]=(line[map[k]]||'').trim();
    out.push(o);
  }
  return out;
}

/* ---------- 상태 분류 ---------- */
function statusKind(s){
  s = (s || '').trim();

  if(s.indexOf('취소') >= 0) return {k:'cancel', label:s, cls:'b-cancel'};
  if(s.indexOf('완료') >= 0) return {k:'done', label:s, cls:'b-done'};
  if(s.indexOf('예약') >= 0) return {k:'book', label:s, cls:'b-book'};
if(s.indexOf('이슈')>=0)
  return {k:'etc',label:s,cls:'b-issue'};

if(s.indexOf('당일')>=0)
  return {k:'etc',label:s,cls:'b-urgent'};

if(s.indexOf('부재')>=0)
  return {k:'etc',label:s,cls:'b-absent'};
  // 처리중이라는 말이 실제로 적혀 있을 때만 처리중으로 계산
  if(s.indexOf('처리중') >= 0) return {k:'prog', label:s, cls:'b-prog'};

  // 나머지 상태는 처리중으로 세지 않음
  return {k:'etc', label:s || '미정', cls:'b-etc'};
}

/* ---------- 상태 ---------- */
var ALL=[],filterStatus='all',mineOnly=false,query='';
var selectedOwner='';

function filterOwner(name, btn){
  selectedOwner=name;

  // 선택한 버튼만 강조 (나머지는 강조 해제)
  document.querySelectorAll('#memberPicker button').forEach(function(b){
    b.classList.remove('active');
  });
  if(btn) btn.classList.add('active');

  render();
}
function render(){
  var list=ALL.filter(function(o){
    if(selectedOwner && (o.who || '').trim() !== selectedOwner) return false;
    if(filterStatus!=='all' && statusKind(o.status).k!==filterStatus) return false;
    if(query){
      var hay=((o.sym||'')+(o.type||'')+(o.url||'')).toLowerCase();
      if(hay.indexOf(query.toLowerCase())<0) return false;
    }
    return true;
  });

  var el=document.getElementById('list');
  if(!list.length){ el.innerHTML='<div class="msg">표시할 점검건이 없어요.</div>'; return; }

  el.innerHTML=list.map(function(o){
    var st=statusKind(o.status);
    var link=o.url && /^https?:/.test(o.url)
      ? '<div class="link"><a href="'+o.url+'" target="_blank" rel="noopener">자마드 열기 ↗</a></div>' : '';
    var meta=[];
    if(o.who) meta.push('처리자 <b>'+o.who+'</b>');
    if(o.dur) meta.push('소요 <b>'+o.dur+'</b>');
       var detail=o.status || '';
    return '<div class="row">'
      +'<div class="head">'
        +(o.type?'<span class="badge b-type">'+o.type+'</span>':'')
        +'<span class="badge '+st.cls+'">'+st.label+'</span>'
        +'<span class="date">'+(o.date||'')+'</span>'
      +'</div>'
      +'<div class="sym">'+(o.sym||'(증상 없음)')+'</div>'
      +(meta.length?'<div class="meta">'+meta.join('')+'</div>':'')
      +(detail?'<div class="detail">세부상태 : '+detail+'</div>':'')
      +link
    +'</div>';
  }).join('');
}

function renderSummary(){
  var cnt={all:ALL.length,book:0,prog:0,done:0,cancel:0,etc:0};
  ALL.forEach(function(o){ cnt[statusKind(o.status).k]++; });
  var defs=[['all','전체'],['book','예약'],['prog','처리중'],['done','완료'],['cancel','취소']];
  document.getElementById('summary').innerHTML=defs.map(function(d){
    return '<div class="chip'+(filterStatus===d[0]?' on':'')+'" data-k="'+d[0]+'">'
      +'<div class="n">'+(cnt[d[0]]||0)+'</div><div class="l">'+d[1]+'</div></div>';
  }).join('');
  document.querySelectorAll('.chip').forEach(function(c){
    c.onclick=function(){ filterStatus=this.getAttribute('data-k'); renderSummary(); render(); };
  });
}

/* ---------- 데이터 로드 ---------- */
function load(){
  var el=document.getElementById('list');
  if(!SHEET_CSV_URL){
    el.innerHTML='<div class="msg">아직 시트 주소가 없어요.<br>HTML 상단 <b>SHEET_CSV_URL</b> 에 게시 CSV 주소를 붙여넣어 주세요.</div>';
    document.getElementById('summary').innerHTML='';
    return;
  }
  el.innerHTML='<div class="msg">불러오는 중…</div>';
  fetch(SHEET_CSV_URL+(SHEET_CSV_URL.indexOf('?')<0?'?':'&')+'t='+Date.now())
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(function(t){
      ALL=buildItems(parseCSV(t));
ALL.sort(function(a,b){
  return new Date(b.date) - new Date(a.date);
});
      renderSummary(); render();
      var d=new Date();
      document.getElementById('updated').textContent='업데이트 '
        +('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    })
    .catch(function(){
      el.innerHTML='<div class="msg">데이터를 불러오지 못했어요.<br>'
        +'시트가 <b>웹에 게시(CSV)</b> 되어 있는지, 주소가 맞는지 확인해 주세요.</div>';
    });
}

document.getElementById('refresh').onclick=load;

document.getElementById('mine').onclick=function(){
  var p=document.getElementById('memberPicker');

  p.style.display =
    p.style.display==='none'
      ? 'flex'
      : 'none';
};

document.getElementById('q').addEventListener('input',function(){
  query=this.value;
  render();
});

load();
</script>
</body>
</html>
