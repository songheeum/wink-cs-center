<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💻 자마드 점검</title>

<!-- ===================================================================
     ▼▼▼ 여기에 구글시트 "웹에 게시(CSV)" 주소를 붙여넣으세요 ▼▼▼
     예) https://docs.google.com/spreadsheets/d/e/2PACX-xxxx/pub?gid=0&single=true&output=csv
=================================================================== -->
<script>
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGdaw55jIrzBzL_Mg9Q-MbCgyqK-8oPrEsk32q8gT218vd6YHTJDPtep7vCPfFABzjGmuxokXI7f0t/pub?gid=742834396&single=true&output=csv";   // ← 여기에 CSV URL 붙여넣기
  var MY_NAME = "도아";       // ← "내 점검건" 기준 (처리자 이름)
</script>

<style>
@font-face{font-family:'Pretendard Variable';font-style:normal;font-weight:45 920;font-display:swap;
  src:url('pretendard.woff2') format('woff2');}

:root{
  --blue:#E76EA6; --blue-dark:#D35792; --blue-deep:#9F3A69;
  --blue-light:#F4ABCB; --blue-soft:#FCF1F6; --blue-soft2:#F8DEEA;
  --ink:#1E2530; --ink-2:#5A6573; --ink-3:#98A2B3;
  --border:#F1E2E9; --bg:#FFF7FA; --card:#ffffff; --radius:18px;
  --g:#34c759; --o:#ff9500; --r:#ff3b30; --gray:#8e8e93;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px;}
.wrap{max-width:1100px;margin:0 auto;}

.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.top h1{font-size:21px;font-weight:700;letter-spacing:-.3px;}
.top .right{display:flex;align-items:center;gap:10px;}
.updated{font-size:12px;color:var(--ink-3);}
.refresh{border:1px solid var(--border);background:var(--card);color:var(--blue);font-family:inherit;
  font-size:13px;font-weight:600;padding:7px 13px;border-radius:10px;cursor:pointer;}
.refresh:active{background:var(--blue-soft);}

/* 상태 요약 칩 */
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.chip{position:relative;flex:1;min-width:104px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:15px 16px 13px;cursor:pointer;overflow:hidden;
  box-shadow:0 4px 14px rgba(231,110,166,.06);transition:transform .14s,box-shadow .16s,border-color .14s;}
.chip::before{content:'';position:absolute;left:0;top:13px;bottom:13px;width:3px;border-radius:0 3px 3px 0;
  background:transparent;transition:background .15s;}
.chip:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(231,110,166,.14);border-color:var(--blue-soft2);}
.chip .n{font-size:27px;font-weight:800;letter-spacing:-.5px;line-height:1;color:var(--ink);}
.chip .l{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);margin-top:9px;font-weight:600;}
.chip .l::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ink-3);flex:0 0 auto;}
.chip[data-k="all"]  .l::before{background:var(--blue);}
.chip[data-k="book"] .l::before{background:var(--blue);}
.chip[data-k="prog"] .l::before{background:var(--o);}
.chip[data-k="done"] .l::before{background:var(--g);}
.chip[data-k="cancel"] .l::before{background:var(--r);}
.chip.on{background:var(--blue-soft);border-color:var(--blue-light);}
.chip.on::before{background:var(--blue);}
.chip[data-k="prog"].on::before{background:var(--o);}
.chip[data-k="done"].on::before{background:var(--g);}
.chip[data-k="cancel"].on::before{background:var(--r);}

/* 컨트롤 */
.controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search{flex:1;position:relative;}
.search input{width:100%;height:44px;border:1px solid var(--border);border-radius:13px;background:var(--card);
  padding:0 14px;font-family:inherit;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(231,110,166,.10);}
.mine{flex:0 0 auto;display:flex;align-items:center;gap:7px;height:44px;border:1px solid var(--border);
  background:var(--card);border-radius:13px;padding:0 15px;font-family:inherit;font-size:13.5px;font-weight:600;
  color:var(--ink-2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.mine:hover{border-color:var(--blue-soft2);}
.mine.on{border-color:var(--blue-light);background:var(--blue-soft);color:var(--blue-deep);}
.mine .cv{font-size:10px;transition:transform .25s ease;}
.mine.on .cv{transform:rotate(180deg);}

/* 담당자 드롭다운 메뉴 (버튼 아래로 떨어짐) */
.owner-wrap{position:relative;flex:0 0 auto;}
#memberPicker{position:absolute;top:calc(100% + 8px);right:0;z-index:50;min-width:190px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:6px;
  display:flex;flex-direction:column;gap:2px;box-shadow:0 16px 40px rgba(159,58,105,.18);
  opacity:0;transform:translateY(-8px) scale(.97);transform-origin:top right;pointer-events:none;
  transition:opacity .18s ease,transform .22s cubic-bezier(.16,1,.3,1);}
#memberPicker.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
#memberPicker button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  border:none;background:transparent;border-radius:11px;padding:7px 12px 7px 7px;
  font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;
  white-space:nowrap;transition:background .12s;-webkit-tap-highlight-color:transparent;}
#memberPicker button .av{width:30px;height:30px;flex:0 0 auto;display:block;border-radius:50%;}
#memberPicker button:hover{background:var(--blue-soft);}
#memberPicker button.active{background:var(--blue-soft);color:var(--blue-deep);}
#memberPicker button.active::after{content:'✓';margin-left:auto;padding-left:10px;color:var(--blue);font-weight:800;}

/* 리스트 */
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;align-content:start;}
.row{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;
  box-shadow:0 3px 12px rgba(231,110,166,.05);transition:transform .12s,box-shadow .15s,border-color .15s;}
.row:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(231,110,166,.12);border-color:var(--blue-soft2);}
.row .head{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;}
.b-type{background:#eef1f5;color:var(--ink-2);}
.b-done{background:#e7f9ec;color:#1a8a3a;}
.b-book{background:var(--blue-soft);color:var(--blue-deep);}
.b-prog{background:#fff3e0;color:#c06f00;}
.b-cancel{background:#f0f0f2;color:var(--gray);}
.b-issue{
  background:#dbeafe;
  color:#2563eb;
}

.b-urgent{
  background:#fee2e2;
  color:#dc2626;
  font-weight:700;
}

.b-absent{
  background:#f3f4f6;
  color:#6b7280;
}

.b-etc{
  background:#eef2ff;
  color:#4338ca;
}
.date{margin-left:auto;font-size:12px;color:var(--ink-3);}
.row .sym{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:6px;}
.row .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-2);}
.row .meta b{font-weight:600;color:var(--ink);}
     .detail{
  margin-top:6px;
  font-size:12px;
  color:#666;
}
.row .link{font-size:12.5px;}
.row .link a{color:var(--blue);text-decoration:none;}
.row .link a:hover{text-decoration:underline;}
.msg{grid-column:1/-1;text-align:center;color:var(--ink-3);font-size:14px;line-height:1.7;padding:48px 16px;}
.msg b{color:var(--ink-2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>💻 자마드 점검</h1>
    <div class="right">
      <span class="updated" id="updated"></span>
      <button class="refresh" id="refresh">새로고침</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>

       <div class="controls">
  <div class="search">
    <input id="q" type="text" placeholder="증상·점검종류·자마드 검색" autocomplete="off">
  </div>

  <div class="owner-wrap" id="ownerWrap">
    <button class="mine" id="mine"><span id="ownerLabel">담당자</span> <span class="cv">▾</span></button>

    <div id="memberPicker" class="picker">
      <button onclick="filterOwner('도아', this)">
        <svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#FCE3EE"/><path d="M8 27C8 13 13 9 20 9s12 4 12 18v3a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2z" fill="#7A4E3B"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.7 21C10.7 13 15 10 20 10s9.3 3 9.3 11c-2.6-3.6-5.6-4.8-9.3-4.8s-6.7 1.2-9.3 4.8z" fill="#7A4E3B"/><circle cx="15.1" cy="23.6" r="1.9" fill="#F49AC0"/><circle cx="24.9" cy="23.6" r="1.9" fill="#F49AC0"/><circle cx="16.4" cy="21.4" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.4" r="1.5" fill="#3A2A33"/><path d="M18 25.8c1.3 1.4 2.7 1.4 4 0" stroke="#C9667F" stroke-width="1.3" fill="none" stroke-linecap="round"/><g transform="translate(30 18)"><path d="M0 0l5-3v6z" fill="#E76EA6"/><circle r="1.5" fill="#D35792"/></g></svg>
        <span>도아</span>
      </button>
      <button onclick="filterOwner('우교', this)">
        <svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#DBF3E9"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.8 21C10.8 12 15 9.5 20 9.5s9.2 3 9.2 11.5c-2-2.8-4-3.8-5.2-3.6 0 0-1.5 1.3-4 1.3s-3.6-1.1-4-1.3c-1.2-.2-3.2.8-5.2 3.6z" fill="#6E4A2E"/><path d="M19 9.8c.5-2.2 2.4-2.6 3.8-1.4" stroke="#6E4A2E" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="15.1" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="24.9" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="16.4" cy="21.7" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.7" r="1.5" fill="#3A2A33"/><path d="M18 26c1.3 1.3 2.7 1.3 4 0" stroke="#A86A55" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
        <span>우교</span>
      </button>
      <button onclick="filterOwner('대성', this)">
        <svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#DCEBFB"/><circle cx="20" cy="22" r="9.3" fill="#FFE1CD"/><path d="M10.6 21C10.6 12 14.6 9 20 9s9.4 3 9.4 12c-2-3-4.3-4-5.4-3.6-.6.2-1.6 1.4-4 1.4s-3.4-1.2-4-1.4c-1.1-.4-3.4.6-5.4 3.6z" fill="#3D3733"/><circle cx="15.1" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="24.9" cy="23.6" r="1.7" fill="#F2A98E"/><circle cx="16.4" cy="21.7" r="1.5" fill="#3A2A33"/><circle cx="23.6" cy="21.7" r="1.5" fill="#3A2A33"/><path d="M18 26c1.3 1.3 2.7 1.3 4 0" stroke="#A86A55" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
        <span>대성</span>
      </button>
      <button onclick="filterOwner('', this)">
        <svg class="av" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="20" fill="#FCF1F6"/><circle cx="14.5" cy="17" r="4.3" fill="#F4ABCB"/><path d="M6.5 30c0-4.5 3.6-6.8 8-6.8s8 2.3 8 6.8z" fill="#F4ABCB"/><circle cx="25.5" cy="17" r="4.3" fill="#E76EA6"/><path d="M17.5 30c0-4.5 3.6-6.8 8-6.8s8 2.3 8 6.8z" fill="#E76EA6"/></svg>
        <span>전체보기</span>
      </button>
    </div>
  </div>
</div>

  <div id="list"></div>
</div>

<script>
/* ---------- CSV 파서 (따옴표·쉼표·줄바꿈 처리) ---------- */
function parseCSV(text){
  var rows=[],row=[],cur="",q=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur);cur=""; }
      else if(c==='\n'){ row.push(cur);rows.push(row);row=[];cur=""; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur);rows.push(row); }
  return rows;
}

/* ---------- 헤더 자동 탐지 + 컬럼명 매핑 ---------- */
var COLS={접수일:'date',점검종류:'type',자마드주소:'url',증상:'sym',처리자:'who',
  소요시간:'dur',상태:'status'
       };
function norm(s){return (s||'').replace(/\s|\(.*?\)/g,'').trim();}

function buildItems(rows){
  var hi=-1;
  for(var i=0;i<rows.length;i++){
    if(rows[i].some(function(c){return norm(c)==='접수일';})){hi=i;break;}
  }
  if(hi<0) return [];
  var header=rows[hi].map(norm);
  var map={};
  header.forEach(function(h,idx){ if(COLS[h]) map[COLS[h]]=idx; });
  var out=[];
  for(var r=hi+1;r<rows.length;r++){
    var line=rows[r];
    if(!line||!(line[map.date]||'').trim()) continue;
    var o={};
    for(var k in map) o[k]=(line[map[k]]||'').trim();
    out.push(o);
  }
  return out;
}

/* ---------- 상태 분류 ---------- */
function statusKind(s){
  s = (s || '').trim();

  if(s.indexOf('취소') >= 0) return {k:'cancel', label:s, cls:'b-cancel'};
  if(s.indexOf('완료') >= 0) return {k:'done', label:s, cls:'b-done'};
  if(s.indexOf('예약') >= 0) return {k:'book', label:s, cls:'b-book'};
if(s.indexOf('이슈')>=0)
  return {k:'etc',label:s,cls:'b-issue'};

if(s.indexOf('당일')>=0)
  return {k:'etc',label:s,cls:'b-urgent'};

if(s.indexOf('부재')>=0)
  return {k:'etc',label:s,cls:'b-absent'};
  // 처리중이라는 말이 실제로 적혀 있을 때만 처리중으로 계산
  if(s.indexOf('처리중') >= 0) return {k:'prog', label:s, cls:'b-prog'};

  // 나머지 상태는 처리중으로 세지 않음
  return {k:'etc', label:s || '미정', cls:'b-etc'};
}

/* ---------- 상태 ---------- */
var ALL=[],filterStatus='all',mineOnly=false,query='';
var selectedOwner='';

function filterOwner(name, btn){
  selectedOwner=name;

  // 선택한 항목만 강조
  document.querySelectorAll('#memberPicker button').forEach(function(b){
    b.classList.remove('active');
  });
  if(btn) btn.classList.add('active');

  // 버튼 라벨에 선택한 담당자 표시
  var lbl=document.getElementById('ownerLabel');
  if(lbl) lbl.textContent = name ? name : '담당자';

  // 선택하면 메뉴 닫기
  document.getElementById('memberPicker').classList.remove('open');
  document.getElementById('mine').classList.remove('on');

  render();
}
function render(){
  var list=ALL.filter(function(o){
    if(selectedOwner && (o.who || '').trim() !== selectedOwner) return false;
    if(filterStatus!=='all' && statusKind(o.status).k!==filterStatus) return false;
    if(query){
      var hay=((o.sym||'')+(o.type||'')+(o.url||'')).toLowerCase();
      if(hay.indexOf(query.toLowerCase())<0) return false;
    }
    return true;
  });

  var el=document.getElementById('list');
  if(!list.length){ el.innerHTML='<div class="msg">표시할 점검건이 없어요.</div>'; return; }

  el.innerHTML=list.map(function(o){
    var st=statusKind(o.status);
    var link=o.url && /^https?:/.test(o.url)
      ? '<div class="link"><a href="'+o.url+'" target="_blank" rel="noopener">자마드 열기 ↗</a></div>' : '';
    var meta=[];
    if(o.who) meta.push('처리자 <b>'+o.who+'</b>');
    if(o.dur) meta.push('소요 <b>'+o.dur+'</b>');
       var detail=o.status || '';
    return '<div class="row">'
      +'<div class="head">'
        +(o.type?'<span class="badge b-type">'+o.type+'</span>':'')
        +'<span class="badge '+st.cls+'">'+st.label+'</span>'
        +'<span class="date">'+(o.date||'')+'</span>'
      +'</div>'
      +'<div class="sym">'+(o.sym||'(증상 없음)')+'</div>'
      +(meta.length?'<div class="meta">'+meta.join('')+'</div>':'')
      +(detail?'<div class="detail">세부상태 : '+detail+'</div>':'')
      +link
    +'</div>';
  }).join('');
}

function renderSummary(){
  var cnt={all:ALL.length,book:0,prog:0,done:0,cancel:0,etc:0};
  ALL.forEach(function(o){ cnt[statusKind(o.status).k]++; });
  var defs=[['all','전체'],['book','예약'],['prog','처리중'],['done','완료'],['cancel','취소']];
  document.getElementById('summary').innerHTML=defs.map(function(d){
    return '<div class="chip'+(filterStatus===d[0]?' on':'')+'" data-k="'+d[0]+'">'
      +'<div class="n">'+(cnt[d[0]]||0)+'</div><div class="l">'+d[1]+'</div></div>';
  }).join('');
  document.querySelectorAll('.chip').forEach(function(c){
    c.onclick=function(){ filterStatus=this.getAttribute('data-k'); renderSummary(); render(); };
  });
}

/* ---------- 데이터 로드 ---------- */
function load(){
  var el=document.getElementById('list');
  if(!SHEET_CSV_URL){
    el.innerHTML='<div class="msg">아직 시트 주소가 없어요.<br>HTML 상단 <b>SHEET_CSV_URL</b> 에 게시 CSV 주소를 붙여넣어 주세요.</div>';
    document.getElementById('summary').innerHTML='';
    return;
  }
  el.innerHTML='<div class="msg">불러오는 중…</div>';
  fetch(SHEET_CSV_URL+(SHEET_CSV_URL.indexOf('?')<0?'?':'&')+'t='+Date.now())
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(function(t){
      ALL=buildItems(parseCSV(t));
ALL.sort(function(a,b){
  return new Date(b.date) - new Date(a.date);
});
      renderSummary(); render();
      var d=new Date();
      document.getElementById('updated').textContent='업데이트 '
        +('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    })
    .catch(function(){
      el.innerHTML='<div class="msg">데이터를 불러오지 못했어요.<br>'
        +'시트가 <b>웹에 게시(CSV)</b> 되어 있는지, 주소가 맞는지 확인해 주세요.</div>';
    });
}

document.getElementById('refresh').onclick=load;

document.getElementById('mine').onclick=function(){
  var open=document.getElementById('memberPicker').classList.toggle('open');
  this.classList.toggle('on', open);
};

document.addEventListener('click', function(e){
  var wrap=document.getElementById('ownerWrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('memberPicker').classList.remove('open');
    document.getElementById('mine').classList.remove('on');
  }
});

document.getElementById('q').addEventListener('input',function(){
  query=this.value;
  render();
});

load();
</script>
</body>
</html>
