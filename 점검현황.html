<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💻 자마드 점검</title>
<script>
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGdaw55jIrzBzL_Mg9Q-MbCgyqK-8oPrEsk32q8gT218vd6YHTJDPtep7vCPfFABzjGmuxokXI7f0t/pub?gid=742834396&single=true&output=csv";
</script>
<style>
@font-face{font-family:'Pretendard Variable';font-style:normal;font-weight:45 920;font-display:swap;src:url('pretendard.woff2') format('woff2');}
:root{
  --bg1:#dff2ff;--bg2:#e8e0ff;--panel:#f8fafc;--card:#ffffff;--line:#e8edf5;
  --ink:#1f2937;--sub:#667085;--muted:#98a2b3;--blue:#2f80ed;--blue2:#eff6ff;
  --green:#12b76a;--greenBg:#ecfdf3;--orange:#f97316;--orangeBg:#fff7ed;
  --red:#ef4444;--redBg:#fef2f2;--purple:#6d28d9;--purpleBg:#f3e8ff;
  --gray:#667085;--grayBg:#f2f4f7;--shadow:0 24px 70px rgba(45,72,120,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));padding:26px;-webkit-font-smoothing:antialiased;}
button,input{font-family:inherit}
.shell{max-width:1220px;margin:0 auto;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(16px);}
.nav{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;font-weight:850;font-size:18px;letter-spacing:-.3px}.logo{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#2f80ed,#91caff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900}.nav-right{display:flex;align-items:center;gap:10px}.updated{font-size:12px;color:var(--muted)}.refresh{border:1px solid var(--line);background:#fff;color:var(--blue);height:38px;padding:0 14px;border-radius:12px;font-weight:700;cursor:pointer}.refresh:hover{background:#f8fbff}
.main{padding:26px 34px 34px;background:rgba(248,250,252,.86)}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px}.hero h1{font-size:25px;letter-spacing:-.5px;margin-bottom:5px;font-weight:750}.hero p{font-size:14px;color:var(--sub)}
.summary{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;margin:18px 0}.chip{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;cursor:pointer;transition:.14s;box-shadow:0 4px 14px rgba(15,23,42,.04)}.chip:hover{transform:translateY(-2px);border-color:#cbd5e1}.chip.on{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,128,237,.12),0 8px 20px rgba(47,128,237,.08)}.chip .n{font-size:28px;font-weight:850;letter-spacing:-.6px}.chip .l{margin-top:8px;font-size:12.5px;color:var(--sub);font-weight:700;display:flex;gap:7px;align-items:center}.chip .l:before{content:'';width:8px;height:8px;border-radius:50%;background:var(--muted)}.chip[data-k="all"] .l:before{background:var(--blue)}.chip[data-k="book"] .l:before{background:var(--blue)}.chip[data-k="prog"] .l:before{background:var(--orange)}.chip[data-k="done"] .l:before{background:var(--green)}.chip[data-k="cancel"] .l:before{background:var(--red)}
.toolbar{display:grid;gap:12px;margin:18px 0}.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.filter-label{min-width:58px;font-size:12px;color:var(--muted);font-weight:800}.tabs{display:flex;gap:9px;align-items:center;white-space:nowrap;flex-wrap:wrap}.tab{border:1px solid transparent;background:transparent;color:var(--sub);font-size:13px;font-weight:750;padding:7px 10px;border-radius:999px;cursor:pointer}.tab:hover{background:#fff;border-color:var(--line)}.tab.on{color:var(--blue);background:#fff;border-color:#bfdbfe;box-shadow:0 2px 8px rgba(47,128,237,.08)}
.topline{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}.search{position:relative}.search:before{content:'⌕';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px}.search input{height:42px;width:280px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:0 14px 0 36px;outline:none;font-size:14px;color:#344054}.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,128,237,.12)}.mine{height:42px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:0 14px;font-size:13px;font-weight:750;color:var(--sub);cursor:pointer}.mine:hover{border-color:#cbd5e1}.picker{display:none;gap:7px;flex-wrap:wrap}.picker button{height:34px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:0 13px;font-size:12.5px;font-weight:750;color:var(--sub);cursor:pointer}.picker button.active{background:var(--blue);border-color:var(--blue);color:#fff}
.table-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 10px 24px rgba(15,23,42,.05)}.thead,.tr-main{display:grid;grid-template-columns:minmax(240px,1.7fr) 120px 100px 86px 112px 64px;gap:12px;align-items:center}.thead{height:52px;background:#fbfcff;border-bottom:1px solid var(--line);padding:0 20px;font-size:12px;color:var(--sub);font-weight:850}.tr{border-bottom:1px solid #f0f2f6}.tr:last-child{border-bottom:none}.tr-main{min-height:54px;padding:0 20px;cursor:pointer;transition:.12s}.tr-main:hover{background:#fbfdff}.sym{font-size:14px;font-weight:600;letter-spacing:-.2px;color:#273445;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subline{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.who,.dur,.date{font-size:13px;color:#667085;font-weight:500}.who b,.dur b{color:#475467;font-weight:600}.more{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:750}.tr.open .more{background:var(--blue);border-color:var(--blue);color:#fff}.detail{display:none;background:#fbfcff;border-top:1px solid #f3f5f8;padding:14px 20px}.tr.open .detail{display:block}.detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.box{background:#fff;border:1px solid #eef1f5;border-radius:14px;padding:11px 12px;font-size:12.5px;color:var(--sub);font-weight:500}.box b{display:block;color:#475467;font-size:13px;margin-bottom:3px;font-weight:700}.link a{display:inline-flex;margin-top:10px;color:var(--blue);font-size:13px;font-weight:800;text-decoration:none}.link a:hover{text-decoration:underline}.badge{display:inline-flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;padding:5px 10px;border-radius:999px;white-space:nowrap}.b-type{background:#f2f4f7;color:#667085}.b-done{background:var(--greenBg);color:#087443}.b-book{background:var(--blue2);color:var(--blue)}.b-prog{background:var(--orangeBg);color:var(--orange)}.b-cancel{background:var(--grayBg);color:var(--gray)}.b-issue{background:var(--orangeBg);color:var(--orange)}.b-urgent{background:var(--redBg);color:var(--red)}.b-absent{background:var(--grayBg);color:var(--gray)}.b-etc{background:var(--purpleBg);color:var(--purple)}.msg{text-align:center;color:var(--muted);font-size:14px;line-height:1.7;padding:48px 16px;background:#fff;border:1px solid var(--line);border-radius:18px}.foot{display:flex;justify-content:space-between;align-items:center;padding:16px 0 0;color:var(--sub);font-size:13px}
@media(max-width:900px){body{padding:12px}.shell{border-radius:22px}.main{padding:18px}.summary{grid-template-columns:repeat(2,1fr)}.topline{align-items:stretch}.tools{align-items:stretch;margin-left:0;width:100%}.search{flex:1}.search input{width:100%}.filter-label{width:100%;min-width:0}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}.thead{display:none}.table-card{background:transparent;border:none;box-shadow:none;display:grid;gap:10px}.tr{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}.tr-main{grid-template-columns:1fr auto;gap:8px;min-height:auto;padding:14px}.tr-main>div:nth-child(1){grid-column:1;grid-row:1}.tr-main>div:nth-child(2){grid-column:2;grid-row:1;text-align:right}.tr-main>div:nth-child(3){grid-column:1;grid-row:2}.tr-main>div:nth-child(4){grid-column:1;grid-row:3}.tr-main>div:nth-child(5){grid-column:2;grid-row:2;text-align:right}.tr-main>div:nth-child(6){grid-column:2;grid-row:3}.detail{padding:12px 14px}.detail-grid{grid-template-columns:1fr}.sym{white-space:normal}.foot{display:none}}
</style>
</head>
<body>
<div class="shell">
  <div class="nav">
    <div class="brand"><div class="logo">💻</div><span>자마드 점검</span></div>
    <div class="nav-right"><span class="updated" id="updated"></span><button class="refresh" id="refresh">새로고침</button></div>
  </div>
  <main class="main">
    <div class="hero"><div><h1>점검 현황 리스트</h1><p>레노버 · 교사PC · 업무폰 점검건을 빠르게 조회합니다.</p></div></div>
    <div class="summary" id="summary"></div>
    <div class="toolbar">
      <div class="topline">
        <div class="filter-row"><span class="filter-label">상태</span><div class="tabs" id="statusTabs"><button class="tab on" data-k="all">전체</button><button class="tab" data-k="book">예약</button><button class="tab" data-k="prog">처리중</button><button class="tab" data-k="done">완료</button><button class="tab" data-k="cancel">취소</button></div></div>
        <div class="tools"><div class="search"><input id="q" type="text" placeholder="증상·점검종류·자마드 검색" autocomplete="off"></div><button class="mine" id="mine">내 점검건</button><div id="memberPicker" class="picker"><button onclick="filterOwner('도아', this)">도아</button><button onclick="filterOwner('우교', this)">우교</button><button onclick="filterOwner('대성', this)">대성</button><button onclick="filterOwner('', this)">전체보기</button></div></div>
      </div>
      <div class="filter-row"><span class="filter-label">월별</span><div class="tabs" id="monthTabs"><button class="tab on" data-month="all">전체기간</button></div></div>
      <div class="filter-row"><span class="filter-label">카테고리</span><div class="tabs" id="catTabs"><button class="tab on" data-catfilter="all">전체카테고리</button></div></div>
    </div>
    <div id="list"></div>
    <div class="foot"><span id="pageInfo">-</span></div>
  </main>
</div>
<script>
function parseCSV(text){var rows=[],row=[],cur="",q=false;for(var i=0;i<text.length;i++){var c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c==='\r'){}else cur+=c;}}if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}
var COLS={접수일:'date',점검종류:'type',자마드주소:'url',증상:'sym',처리자:'who',소요시간:'dur',상태:'status',증상카테고리:'cat',카테고리:'cat',분류:'cat'};
function norm(s){return (s||'').replace(/\s|\(.*?\)/g,'').trim();}
function buildItems(rows){var hi=-1;for(var i=0;i<rows.length;i++){if(rows[i].some(function(c){return norm(c)==='접수일';})){hi=i;break;}}if(hi<0)return[];var header=rows[hi].map(norm);var map={};header.forEach(function(h,idx){if(COLS[h])map[COLS[h]]=idx;});var out=[];for(var r=hi+1;r<rows.length;r++){var line=rows[r];if(!line||!(line[map.date]||'').trim())continue;var o={};for(var k in map)o[k]=(line[map[k]]||'').trim();if(!o.cat && line[4]) o.cat=(line[4]||'').trim();out.push(o);}return out;}
function statusKind(s){s=(s||'').trim();if(s.indexOf('취소')>=0)return{k:'cancel',label:s,cls:'b-cancel'};if(s.indexOf('이슈')>=0)return{k:'etc',label:s,cls:'b-issue'};if(s.indexOf('당일')>=0)return{k:'etc',label:s,cls:'b-urgent'};if(s.indexOf('부재')>=0)return{k:'etc',label:s,cls:'b-absent'};if(s.indexOf('완료')>=0)return{k:'done',label:s,cls:'b-done'};if(s.indexOf('예약')>=0)return{k:'book',label:s,cls:'b-book'};if(s.indexOf('처리중')>=0)return{k:'prog',label:s,cls:'b-prog'};return{k:'etc',label:s||'미정',cls:'b-etc'};}
var ALL=[],filterStatus='all',filterMonth='all',filterCat='all',query='',selectedOwner='';
function filterOwner(name,btn){selectedOwner=name;document.querySelectorAll('#memberPicker button').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');render();}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shortDate(d){return (d||'').replace(/^20/,'');}
function monthKey(d){return (d||'').trim().substring(0,7);}
function monthLabel(m){if(m==='all')return'전체기간';var parts=m.split('-');return (parts[0]||'')+'년 '+String(Number(parts[1]||0))+'월';}
function unique(arr){var out=[];arr.forEach(function(v){v=(v||'').trim();if(v&&out.indexOf(v)<0)out.push(v);});return out;}
function renderFilterButtons(){
  var months=unique(ALL.map(function(o){return monthKey(o.date);})).sort().reverse();
  document.getElementById('monthTabs').innerHTML='<button class="tab '+(filterMonth==='all'?'on':'')+'" data-month="all">전체기간</button>'+months.map(function(m){return '<button class="tab '+(filterMonth===m?'on':'')+'" data-month="'+esc(m)+'">'+esc(monthLabel(m))+'</button>';}).join('');
  var cats=unique(ALL.map(function(o){return o.cat;})).sort();
  document.getElementById('catTabs').innerHTML='<button class="tab '+(filterCat==='all'?'on':'')+'" data-catfilter="all">전체카테고리</button>'+cats.map(function(c){return '<button class="tab '+(filterCat===c?'on':'')+'" data-catfilter="'+esc(c)+'">'+esc(c)+'</button>';}).join('');
  document.querySelectorAll('#monthTabs .tab').forEach(function(b){b.onclick=function(){filterMonth=this.getAttribute('data-month');renderFilterButtons();render();};});
  document.querySelectorAll('#catTabs .tab').forEach(function(b){b.onclick=function(){filterCat=this.getAttribute('data-catfilter');renderFilterButtons();render();};});
}
function filteredList(){return ALL.filter(function(o){
  if(selectedOwner&&(o.who||'').trim()!==selectedOwner)return false;
  if(filterStatus!=='all'&&statusKind(o.status).k!==filterStatus)return false;
  if(filterMonth!=='all'&&monthKey(o.date)!==filterMonth)return false;
  if(filterCat!=='all'&&(o.cat||'').trim()!==filterCat)return false;
  if(query){var hay=((o.sym||'')+(o.type||'')+(o.cat||'')+(o.url||'')+(o.who||'')+(o.status||'')).toLowerCase();if(hay.indexOf(query.toLowerCase())<0)return false;}
  return true;
});}
function render(){var list=filteredList();var el=document.getElementById('list');document.getElementById('pageInfo').textContent='표시 '+list.length+'건 / 전체 '+ALL.length+'건';if(!list.length){el.innerHTML='<div class="msg">표시할 점검건이 없어요.</div>';return;}var head='<div class="table-card"><div class="thead"><div>증상</div><div>상태</div><div>처리자</div><div>소요</div><div>날짜</div><div>더보기</div></div>';var rows=list.map(function(o){var st=statusKind(o.status);var link=o.url&&/^https?:/.test(o.url)?'<div class="link"><a href="'+esc(o.url)+'" target="_blank" rel="noopener">자마드 열기 ↗</a></div>':'';return '<div class="tr" onclick="toggleRow(this,event)">'+'<div class="tr-main">'+'<div><div class="sym">'+esc(o.sym||'(증상 없음)')+'</div><div class="subline">'+esc((o.cat?o.cat+' · ':'')+(o.type||'-'))+'</div></div>'+'<div><span class="badge '+st.cls+'">'+esc(st.label)+'</span></div>'+'<div class="who"><b>'+esc(o.who||'-')+'</b></div>'+'<div class="dur"><b>'+esc(o.dur||'-')+'</b></div>'+'<div class="date">'+esc(shortDate(o.date)||'-')+'</div>'+'<div class="more">⋯</div>'+'</div>'+'<div class="detail"><div class="detail-grid"><div class="box"><b>증상 카테고리</b>'+esc(o.cat||'-')+'</div><div class="box"><b>점검종류</b>'+esc(o.type||'-')+'</div><div class="box"><b>세부상태</b>'+esc(o.status||'-')+'</div><div class="box"><b>접수일</b>'+esc(o.date||'-')+'</div></div>'+link+'</div>'+'</div>';}).join('');el.innerHTML=head+rows+'</div>';}
function toggleRow(row,e){if(e.target.tagName==='A')return;row.classList.toggle('open');}
function renderSummary(){var cnt={all:ALL.length,book:0,prog:0,done:0,cancel:0,etc:0};ALL.forEach(function(o){cnt[statusKind(o.status).k]++;});var defs=[['all','전체'],['book','예약'],['prog','처리중'],['done','완료'],['cancel','취소']];document.getElementById('summary').innerHTML=defs.map(function(d){return '<div class="chip'+(filterStatus===d[0]?' on':'')+'" data-k="'+d[0]+'"><div class="n">'+(cnt[d[0]]||0)+'</div><div class="l">'+d[1]+'</div></div>';}).join('');document.querySelectorAll('.chip,#statusTabs .tab').forEach(function(c){c.classList.toggle('on',c.getAttribute('data-k')===filterStatus);c.onclick=function(){filterStatus=this.getAttribute('data-k');renderSummary();render();};});}
function load(){var el=document.getElementById('list');if(!SHEET_CSV_URL){el.innerHTML='<div class="msg">시트 주소가 없어요.</div>';return;}el.innerHTML='<div class="msg">불러오는 중…</div>';fetch(SHEET_CSV_URL+(SHEET_CSV_URL.indexOf('?')<0?'?':'&')+'t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(t){ALL=buildItems(parseCSV(t));ALL.sort(function(a,b){return new Date(b.date)-new Date(a.date);});renderSummary();renderFilterButtons();render();var d=new Date();document.getElementById('updated').textContent='업데이트 '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}).catch(function(){el.innerHTML='<div class="msg">데이터를 불러오지 못했어요.<br>시트 게시 상태와 CSV 주소를 확인해 주세요.</div>';});}
document.getElementById('refresh').onclick=load;document.getElementById('mine').onclick=function(){var p=document.getElementById('memberPicker');p.style.display=(p.style.display==='flex')?'none':'flex';};document.getElementById('q').addEventListener('input',function(){query=this.value;render();});load();
</script>
</body>
</html>
